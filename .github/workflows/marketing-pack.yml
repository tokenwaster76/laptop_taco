name: Marketing pack

on:
  workflow_dispatch:

jobs:
  build:
    name: Generate launch pack artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x marketing/scripts/*.sh

      - name: Generate pack
        run: marketing/scripts/generate-launch-pack.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launch-pack
          path: marketing/dist/launch-pack.md
