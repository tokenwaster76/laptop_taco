name: Marketing pack

on:
  workflow_dispatch:

env:
  # Opt JavaScript actions into Node 24 now (v20 deprecated; forced switch
  # June 2nd, 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Generate launch pack artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x marketing/scripts/*.sh

      - name: Generate pack
        run: marketing/scripts/generate-launch-pack.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launch-pack
          path: marketing/dist/launch-pack.md
