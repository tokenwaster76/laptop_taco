name: macOS smoke test

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  # Opt JavaScript actions into Node 24 now (v20 is deprecated; the forced
  # switch lands June 2nd, 2026). See:
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    name: taco on macos-latest
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print macOS version
        run: |
          sw_vers
          uname -a

      - name: Verify required macOS tools
        run: |
          command -v caffeinate
          command -v pmset
          command -v osascript

      - name: Syntax check
        run: bash -n ./taco

      - name: Make taco executable
        run: chmod +x ./taco

      - name: taco --help
        run: ./taco --help

      - name: taco --version
        run: ./taco --version

      - name: Happy path
        run: ./taco "echo cooking && sleep 1 && echo done"

      - name: Exit code propagation (42)
        run: |
          set +e
          ./taco "exit 42"
          code=$?
          echo "Exit code: $code"
          test "$code" -eq 42
