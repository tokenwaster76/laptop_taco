name: macOS smoke test

on:
  push:
  pull_request:

jobs:
  smoke:
    name: taco on macos-latest
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print macOS version
        run: |
          sw_vers
          uname -a

      - name: Verify required macOS tools
        run: |
          command -v caffeinate
          command -v pmset
          command -v osascript

      - name: Make taco executable
        run: chmod +x ./taco

      - name: Syntax check
        run: bash -n ./taco

      - name: taco --help
        run: ./taco --help

      - name: taco --version
        run: |
          out="$(./taco --version)"
          echo "$out"
          test "$out" = "taco 0.1.0"

      - name: taco doctor (should exit 0 on macos-latest)
        run: ./taco doctor

      - name: Help text mentions doctor
        run: ./taco --help | grep -q "taco doctor"

      - name: Happy path
        run: ./taco "echo cooking && sleep 1 && echo done"

      - name: Exit code propagation (42)
        run: |
          set +e
          ./taco "exit 42"
          code=$?
          echo "Exit code: $code"
          test "$code" -eq 42

      - name: Exit code propagation (127, command not found)
        run: |
          set +e
          ./taco "this-binary-definitely-does-not-exist"
          code=$?
          echo "Exit code: $code"
          test "$code" -eq 127

      - name: Shell features (pipes + &&)
        run: ./taco "echo a | tr a-z A-Z && echo done"

      - name: Quoted args with embedded single quotes
        run: ./taco "echo \"taco's lid\""

      - name: Missing-command guard exits 1
        run: |
          set +e
          ./taco
          code=$?
          test "$code" -eq 1

      # v0.1.0: the Ctrl+C trap is verified manually. CI does not give us a
      # reliable TTY to deliver SIGINT to the foreground process group the way
      # a terminal does, so a script-based test would be flaky. Revisit when
      # we add `script`/`expect` harness support.
