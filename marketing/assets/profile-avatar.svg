<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Laptop Taco profile avatar — a stylized taco on a dark canvas with the project's amber accent.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#1a1a20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.55" r="0.45">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shellOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c98c"/>
      <stop offset="100%" stop-color="#c98c4a"/>
    </linearGradient>
    <linearGradient id="shellInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1a865"/>
      <stop offset="100%" stop-color="#a76e2d"/>
    </linearGradient>
    <linearGradient id="lettuce" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a4cf6b"/>
      <stop offset="100%" stop-color="#6a9b3f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle amber glow behind the taco -->
  <circle cx="512" cy="560" r="430" fill="url(#glow)"/>

  <!-- Amber ring -->
  <circle cx="512" cy="512" r="496" fill="none" stroke="#f5a623" stroke-opacity="0.32" stroke-width="4"/>

  <!-- Taco illustration -->
  <g transform="translate(512 560)">
    <!-- Outer shell (folded tortilla, half-pill) -->
    <path d="M -300 -40 Q -300 240 0 240 Q 300 240 300 -40 Z"
          fill="url(#shellOuter)" stroke="#7c4a18" stroke-width="6"/>
    <!-- Inner shadow rim -->
    <path d="M -276 -22 Q -276 220 0 220 Q 276 220 276 -22 Z"
          fill="url(#shellInner)"/>
    <!-- Tortilla highlight -->
    <path d="M -260 -10 Q -260 -32 -180 -34 L 180 -34 Q 260 -32 260 -10"
          fill="none" stroke="#f7d49b" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

    <!-- Lettuce mound -->
    <path d="M -260 -28
             Q -240 -90 -180 -65
             Q -120 -110 -60 -78
             Q -10 -120 60 -82
             Q 120 -118 180 -72
             Q 240 -100 260 -28 Z"
          fill="url(#lettuce)" stroke="#3f6a25" stroke-width="4" stroke-linejoin="round"/>
    <!-- Lettuce highlight -->
    <path d="M -200 -52 Q -150 -68 -100 -58 M -40 -72 Q 0 -90 60 -68 M 120 -76 Q 170 -84 210 -58"
          fill="none" stroke="#c2e29c" stroke-width="5" stroke-linecap="round" opacity="0.75"/>

    <!-- Tomato / salsa cubes -->
    <rect x="-176" y="-46" width="32" height="32" rx="6" fill="#e53935" stroke="#9b1c1c" stroke-width="3" transform="rotate(-8 -160 -30)"/>
    <rect x="-60" y="-54" width="30" height="30" rx="6" fill="#ef5350" stroke="#9b1c1c" stroke-width="3" transform="rotate(12 -45 -39)"/>
    <rect x="58" y="-46" width="34" height="34" rx="6" fill="#e53935" stroke="#9b1c1c" stroke-width="3" transform="rotate(-4 75 -29)"/>
    <rect x="146" y="-50" width="30" height="30" rx="6" fill="#ef5350" stroke="#9b1c1c" stroke-width="3" transform="rotate(18 161 -35)"/>

    <!-- Cheese shreds -->
    <rect x="-130" y="-66" width="64" height="10" rx="5" fill="#fdd835" stroke="#a98714" stroke-width="2.5" transform="rotate(-6 -98 -61)"/>
    <rect x="10" y="-72" width="70" height="10" rx="5" fill="#ffeb3b" stroke="#a98714" stroke-width="2.5" transform="rotate(4 45 -67)"/>
    <rect x="80" y="-90" width="46" height="9" rx="4.5" fill="#fdd835" stroke="#a98714" stroke-width="2.5" transform="rotate(-12 103 -85)"/>
  </g>

  <!-- Wordmark — small, lower-right -->
  <text x="952" y="990" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="600" fill="#f5a623" text-anchor="end" opacity="0.88">taco</text>
</svg>
