<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Laptop Taco terminal demo output">
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#f8c471"/>
    </linearGradient>
    <filter id="windowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- desk -->
  <rect width="1280" height="720" fill="#1a1a20"/>

  <!-- terminal window -->
  <g filter="url(#windowShadow)">
    <rect x="80" y="60" width="1120" height="600" rx="12" fill="#1e1e22" stroke="#2c2c33" stroke-width="1"/>
    <!-- title bar -->
    <rect x="80" y="60" width="1120" height="34" rx="12" fill="#2a2a30"/>
    <rect x="80" y="82" width="1120" height="12" fill="#2a2a30"/>
    <!-- traffic lights -->
    <circle cx="110" cy="77" r="7" fill="#ff5f57"/>
    <circle cx="132" cy="77" r="7" fill="#febc2e"/>
    <circle cx="154" cy="77" r="7" fill="#28c840"/>
    <!-- title text -->
    <text x="640" y="83" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="13" fill="#9aa0a6" text-anchor="middle">taco — claude — 80×24</text>
  </g>

  <!-- terminal content -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#d4d4d8">
    <text x="108" y="130"><tspan fill="#28c840">tokenwaster76@mbp</tspan> <tspan fill="#9aa0a6">~/projects/laptop_taco</tspan> <tspan fill="#5b6066">$</tspan> ./taco claude</text>

    <text x="108" y="170" font-size="22" fill="url(#title)" font-weight="600">🌮 Laptop Taco engaged</text>

    <text x="108" y="208" fill="#9aa0a6">Keeping your Mac awake while this runs:</text>
    <text x="108" y="244">  <tspan fill="#f5a623">claude</tspan></text>

    <text x="108" y="284"><tspan fill="#9aa0a6">PID:</tspan>     42117</text>
    <text x="108" y="310"><tspan fill="#9aa0a6">Started:</tspan> 14:32:08</text>
    <text x="108" y="336"><tspan fill="#9aa0a6">Battery:</tspan> 74%</text>
    <text x="108" y="362"><tspan fill="#9aa0a6">Mode:</tspan>    cracked-open chaos</text>

    <text x="108" y="402" fill="#febc2e">Do not put a hot running laptop in a backpack. Seriously.</text>
    <text x="108" y="428" fill="#9aa0a6">Close the taco with Ctrl+C.</text>

    <text x="108" y="468" fill="#6b7280">[claude] reading 47 files...</text>
    <text x="108" y="494" fill="#6b7280">[claude] proposing 3 refactors...</text>
    <text x="108" y="520" fill="#6b7280">[claude] done.</text>

    <text x="108" y="560" fill="#28c840" font-weight="600">✅ Agent finished cooking</text>
    <text x="108" y="586"><tspan fill="#9aa0a6">Runtime:</tspan>   23m 18s</text>
    <text x="108" y="612"><tspan fill="#9aa0a6">Exit code:</tspan> 0</text>

    <text x="108" y="640" fill="#9aa0a6">You may now close the taco.</text>
  </g>
</svg>
