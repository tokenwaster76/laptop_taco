<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Laptop Taco — For when your agent is cooking and you need to catch a bus.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e10"/>
      <stop offset="100%" stop-color="#1a1a20"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="start">
    <text x="80" y="200" font-size="108" font-weight="700" fill="#f5a623">Laptop Taco 🌮</text>
    <text x="80" y="295" font-size="40" fill="#e6e6ea">For when your agent is cooking and you need to catch a bus.</text>
    <text x="80" y="430" font-size="34" fill="#9aa0a6">No app. No account. No cloud.</text>
    <text x="80" y="478" font-size="34" fill="#9aa0a6">Just a responsible taco.</text>
    <text x="80" y="580" font-size="26" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#5b6066">$ ./taco claude</text>
  </g>
</svg>
